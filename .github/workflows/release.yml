name: release

# Build the `tcast` client for every supported target on each version tag and
# publish the binaries (+ sha256 checksums) to a GitHub Release. The relay is
# operator-only and is NOT shipped here.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          # ARM Linux uses a native arm64 runner (free on public repos). Remove
          # this entry if your plan has no arm64 runners available.
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # native-tls links system OpenSSL; cpal (voice) links ALSA — both on Linux.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libasound2-dev

      - name: Build tcast
        # TCAST_DEFAULT_RELAY bakes a hosted relay into the binary so a freshly
        # installed `tcast` works with zero config. Set repo variable
        # TCAST_DEFAULT_RELAY (Settings → Secrets and variables → Actions → Variables),
        # e.g. wss://relay.example.com. Empty = no baked default (falls back to localhost).
        env:
          TCAST_DEFAULT_RELAY: ${{ vars.TCAST_DEFAULT_RELAY }}
        run: cargo build --release -p tcast --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          asset="tcast-${{ matrix.target }}.tar.gz"
          # Archive the binary at the root so `tcast upgrade` (self_update) and
          # the install scripts can locate it without a staging subdir.
          tar -czf "$asset" -C "target/${{ matrix.target }}/release" tcast
          if command -v sha256sum >/dev/null; then sha256sum "$asset" > "$asset.sha256"; else shasum -a 256 "$asset" > "$asset.sha256"; fi
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cwd = (Get-Location).Path
          $asset = "tcast-${{ matrix.target }}.zip"
          $assetPath = Join-Path $cwd $asset
          $srcPath = Join-Path $cwd "target/${{ matrix.target }}/release/tcast.exe"
          # STORED (no compression) so even older `tcast upgrade` clients — whose
          # bundled zip reader lacks deflate — can extract it. Binary at the root.
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          if (Test-Path $assetPath) { Remove-Item $assetPath }
          $zip = [System.IO.Compression.ZipFile]::Open($assetPath, 'Create')
          [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $srcPath, "tcast.exe", [System.IO.Compression.CompressionLevel]::NoCompression) | Out-Null
          $zip.Dispose()
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          "$hash  $asset" | Out-File -Encoding ascii "$asset.sha256"
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
